<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نـبـض</title>

<style>
:root{
  --dark:#30364F;
  --blue:#ACBAC4;
  --beige:#E1D9BC;
  --light:#F0F0DB;
  --white:#fff;
  --hover:#2c3145;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',Tahoma,sans-serif;
  background:var(--light);
  color:var(--dark);
  direction:rtl;
}
header{
  background:var(--dark);
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:22px;
  position:sticky;
  top:0;
}
header button{
  background:var(--blue);
  color:var(--dark);
  border:none;
  padding:8px 16px;
  border-radius:20px;
  cursor:pointer;
}

.main-container{
  max-width:1200px;
  margin:auto;
  display:flex;
  gap:20px;
  padding:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.posts-container{
  flex:0 1 600px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.admin-panel, .news-panel{
  background:var(--beige);
  padding:20px;
  border-radius:12px;
}

.card{
  background:var(--white);
  border-radius:12px;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.card img{
  width:100%;
  border-radius:12px;
}

.comment{
background:#eee;
padding:6px;
border-radius:6px;
margin-top:6px;
font-size:14px;
}

.comment-box{
display:flex;
gap:8px;
}

.comment-box input{
flex:1;
padding:6px;
}

button.action-btn{
  background:var(--dark);
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
}

.news-panel{
  flex:0 1 250px;
}

.hidden{
display:none;
}

audio{
width:100%;
}
</style>

</head>

<body>

<header>
<div>نـبـض</div>
<button id="loginToggleBtn">تسجيل الدخول</button>
</header>

<div class="login-panel hidden" id="loginBox">
<h3>تسجيل دخول الأدمن</h3>
<input id="user" placeholder="الايميل">
<input id="pass" type="password" placeholder="كلمة المرور">
<button onclick="login()">دخول</button>
</div>

<div class="main-container">

<div class="posts-container" id="postsContainer"></div>

<div class="news-panel">
<h3>أخبار عاجلة</h3>
<ul id="newsList"></ul>

<div class="hidden" id="addNewsPanel">
<input id="newsText" placeholder="أدخل خبر">
<button onclick="addNews()">إضافة</button>
</div>

</div>
</div>

<div class="admin-panel hidden" id="adminPanel">

<h3>إضافة منشور</h3>

<textarea id="postText" placeholder="اكتب المنشور"></textarea>

<input type="file" id="postImage">

<input type="file" id="postMusic">

<button onclick="addPost()">نشر</button>

</div>


<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>


<script>

const firebaseConfig = {
  apiKey: "AIzaSyCIZg8E-vsqV5k1xWwM3SohZb8A-dJDxm8",
  authDomain: "khursa-5a8ea.firebaseapp.com",
  databaseURL: "https://khursa-5a8ea-default-rtdb.firebaseio.com",
  projectId: "khursa-5a8ea",
  storageBucket: "khursa-5a8ea.firebasestorage.app",
  messagingSenderId: "212197121646",
  appId: "1:212197121646:web:01c63ede18ba9f63bd507f",
  measurementId: "G-1BWDFLWEMB"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let isAdmin=false;

const loginBox=document.getElementById("loginBox");
const addNewsPanel=document.getElementById("addNewsPanel");

document.getElementById("loginToggleBtn").onclick=()=>{

loginBox.classList.toggle("hidden");

};


function login(){

let email=document.getElementById("user").value;

let pass=document.getElementById("pass").value;

firebase.auth().signInWithEmailAndPassword(email,pass)

.then(()=>{

isAdmin=true;

document.getElementById("adminPanel").classList.remove("hidden");

addNewsPanel.classList.remove("hidden");

loginBox.classList.add("hidden");

showPosts();

showNews();

})

.catch(()=>{

alert("فشل تسجيل الدخول");

});

}



async function addPost(){

let text=document.getElementById("postText").value;

let id=Date.now();

db.ref("posts/"+id).set({

text:text,

likes:0,

comments:{}

});

document.getElementById("postText").value="";

showPosts();

}



function showPosts(){

db.ref("posts").on("value",(snap)=>{

let posts=snap.val();

let container=document.getElementById("postsContainer");

container.innerHTML="";

for(let id in posts){

let p=posts[id];

let commentsHTML="";

if(p.comments){

for(let c in p.comments){

commentsHTML+=`<div class="comment">${p.comments[c]}</div>`;

}

}

container.innerHTML+=`

<div class="card">

<p>${p.text}</p>

<div>

<button class="action-btn" onclick="likePost('${id}',${p.likes})">❤️ ${p.likes}</button>

${isAdmin?`<button class="action-btn" onclick="deletePost('${id}')">حذف</button>`:""}

</div>

<div class="comment-box">

<input id="comment${id}" placeholder="تعليق">

<button onclick="addComment('${id}')">تعليق</button>

</div>

${commentsHTML}

</div>

`;

}

});

}



function likePost(id,likes){

db.ref("posts/"+id+"/likes").set(likes+1);

}



function deletePost(id){

db.ref("posts/"+id).remove();

}



function addComment(id){

let text=document.getElementById("comment"+id).value;

if(!text) return;

let cid=Date.now();

db.ref("posts/"+id+"/comments/"+cid).set(text);

}



function addNews(){

let text=document.getElementById("newsText").value;

let id=Date.now();

db.ref("news/"+id).set(text);

document.getElementById("newsText").value="";

}



function showNews(){

db.ref("news").on("value",(snap)=>{

let data=snap.val();

let list=document.getElementById("newsList");

list.innerHTML="";

for(let id in data){

list.innerHTML+=`<li>${data[id]}</li>`;

}

});

}

showPosts();

showNews();

</script>

</body>
</html>
