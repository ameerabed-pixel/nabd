<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نـبـض</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --dark:#30364F;
  --blue:#ACBAC4;
  --beige:#E1D9BC;
  --light:#F0F0DB;
  --white:#fff;
  --hover:#2c3145;
  --shadow:0 4px 12px rgba(0,0,0,0.1);
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',Tahoma,sans-serif;background:var(--light);color:var(--dark);direction:rtl;}
header{
  background:var(--dark);
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:22px;
  position:sticky;
  top:0;
  box-shadow:var(--shadow);
}
header button{
  background:var(--blue);
  color:var(--dark);
  border:none;
  padding:8px 16px;
  border-radius:20px;
  cursor:pointer;
  transition:0.3s;
}
header button:hover{ background:var(--hover); color:white; }

.main-container{max-width:1200px;margin:auto;display:flex;gap:20px;padding:20px;flex-wrap:wrap;justify-content:center;}
.posts-container{flex:0 1 600px;display:flex;flex-direction:column;gap:20px;}
.admin-panel,.news-panel{background:var(--beige);padding:20px;border-radius:12px;box-shadow:var(--shadow);}
.card{background:var(--white);border-radius:12px;padding:15px;display:flex;flex-direction:column;gap:10px;box-shadow:var(--shadow);}
.card img{width:100%;border-radius:12px;}
.comment{background:#eee;padding:6px;border-radius:6px;margin-top:6px;font-size:14px;}
.comment-box{display:flex;gap:8px;}
.comment-box input{flex:1;padding:6px;border-radius:6px;border:1px solid #ccc;}
button.action-btn{
  background:var(--dark);
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
  transition:0.3s;
}
button.action-btn:hover{ background:var(--hover); }
.news-panel{flex:0 1 250px;}
.hidden{display:none !important;}
audio{width:100%;border-radius:8px;}

/* لوحات تسجيل الدخول وإنشاء الحساب والإعدادات */
.login-panel{
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:var(--white);
  padding:30px;
  border-radius:12px;
  box-shadow:0 8px 24px rgba(0,0,0,0.2);
  width:320px;
  display:flex;
  flex-direction:column;
  gap:12px;
  z-index:1000;
}
.login-panel input{
  padding:10px;
  border:1px solid #ccc;
  border-radius:8px;
}
.login-panel button{
  background:var(--blue);
  color:var(--dark);
  border:none;
  padding:10px;
  border-radius:20px;
  cursor:pointer;
  font-weight:bold;
}
.login-panel button:hover{ background:var(--hover); color:white; }
.login-panel h3{margin:0;text-align:center;color:var(--dark);}
.admin-panel { margin-top:20px; } /* مسافة بين المنشورات ولوحة الإضافة */
</style>
</head>
<body>

<header>
  <div>نـبـض</div>
  <div>
    <button id="loginToggleBtn"><i class="fa-solid fa-right-to-bracket"></i> تسجيل الدخول</button>
    <button id="accountSettingsBtn" class="hidden"><i class="fa-solid fa-user-cog"></i> إعدادات الحساب</button>
    <button id="logoutBtn" class="hidden"><i class="fa-solid fa-right-from-bracket"></i> تسجيل الخروج</button>
  </div>
</header>

<!-- لوحة تسجيل الدخول / إنشاء حساب -->
<div class="login-panel hidden" id="loginBox">
  <h3><i class="fa-solid fa-user-shield"></i> تسجيل دخول / إنشاء حساب</h3>
  <input id="user" placeholder="الايميل">
  <input id="pass" type="password" placeholder="كلمة المرور">
  <button onclick="login()"><i class="fa-solid fa-right-to-bracket"></i> دخول</button>
  <hr>
  <input id="newEmail" placeholder="الايميل">
  <input id="newPass" type="password" placeholder="كلمة المرور">
  <input id="username" placeholder="اسم المستخدم">
  <input type="file" id="profilePic">
  <button onclick="signup()"><i class="fa-solid fa-user-plus"></i> إنشاء حساب</button>
</div>

<!-- إعدادات الحساب -->
<div class="login-panel hidden" id="accountSettingsBox">
  <h3><i class="fa-solid fa-user-cog"></i> إعدادات الحساب</h3>
  <input id="newUsername" placeholder="اسم المستخدم الجديد">
  <input type="file" id="newProfilePic">
  <button onclick="updateAccount()"><i class="fa-solid fa-save"></i> حفظ التغييرات</button>
</div>

<div class="main-container">
  <div class="posts-container" id="postsContainer">
    <!-- المنشورات ستظهر هنا -->
  </div>

  <!-- الأخبار -->
  <div class="news-panel">
    <h3><i class="fa-solid fa-newspaper"></i> أخبار عاجلة</h3>
    <ul id="newsList"></ul>
    <div class="hidden" id="addNewsPanel">
      <input id="newsText" placeholder="أدخل خبر">
      <button onclick="addNews()"><i class="fa-solid fa-plus"></i> إضافة</button>
    </div>
  </div>
</div>

<!-- لوحة إضافة المنشور في نهاية الصفحة -->
<div class="admin-panel hidden" id="adminPanel">
  <h3><i class="fa-solid fa-pencil"></i> إضافة منشور</h3>
  <textarea id="postText" placeholder="اكتب المنشور"></textarea>
  <input type="file" id="postImage">
  <input type="file" id="postMusic">
  <button onclick="addPost()"><i class="fa-solid fa-paper-plane"></i> نشر</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCIZg8E-vsqV5k1xWwM3SohZb8A-dJDxm8",
  authDomain: "khursa-5a8ea.firebaseapp.com",
  databaseURL: "https://khursa-5a8ea-default-rtdb.firebaseio.com",
  projectId: "khursa-5a8ea",
  storageBucket: "khursa-5a8ea.appspot.com",
  messagingSenderId: "212197121646",
  appId: "1:212197121646:web:01c63ede18ba9f63bd507f",
  measurementId: "G-1BWDFLWEMB"
};
firebase.initializeApp(firebaseConfig);

const CLOUD_NAME="drqglqclz";
const UPLOAD_PRESET="khursa";

let currentUser=null;
const loginBox=document.getElementById("loginBox");
const addNewsPanel=document.getElementById("addNewsPanel");
const logoutBtn=document.getElementById("logoutBtn");
const accountSettingsBtn=document.getElementById("accountSettingsBtn");
const accountSettingsBox=document.getElementById("accountSettingsBox");

document.getElementById("loginToggleBtn").addEventListener("click", ()=>{ loginBox.classList.toggle("hidden"); });

let selectedFile=null;
let selectedMusic=null;
let profileFile=null;
let newProfileFile=null;
document.getElementById("postImage").addEventListener("change",e=>{ selectedFile=e.target.files[0]; });
document.getElementById("postMusic").addEventListener("change",e=>{ selectedMusic=e.target.files[0]; });
document.getElementById("profilePic").addEventListener("change", e=>{ profileFile=e.target.files[0]; });
document.getElementById("newProfilePic").addEventListener("change", e=>{ newProfileFile=e.target.files[0]; });

// تسجيل الدخول
function login(){
  let email=document.getElementById("user").value;
  let pass=document.getElementById("pass").value;
  firebase.auth().signInWithEmailAndPassword(email,pass)
  .then((cred)=>{
    currentUser=cred.user;
    loginBox.classList.add("hidden");
    document.getElementById("adminPanel").classList.remove("hidden");
    addNewsPanel.classList.remove("hidden");
    logoutBtn.classList.remove("hidden");
    accountSettingsBtn.classList.remove("hidden");
    document.getElementById("loginToggleBtn").classList.add("hidden");
    showPosts();
    showNews();
  })
  .catch((error)=>{ alert("فشل تسجيل الدخول: " + error.message); });
}

// إنشاء حساب جديد
async function signup(){
  let email = document.getElementById("newEmail").value.trim();
  let pass = document.getElementById("newPass").value;
  let username = document.getElementById("username").value.trim();
  if(!email || !pass || !username) { alert("املأ جميع الحقول"); return; }

  let usernameExists = await firebase.database().ref("users").orderByChild("username").equalTo(username).once("value");
  if(usernameExists.exists()){ alert("اسم المستخدم موجود مسبقاً"); return; }

  firebase.auth().createUserWithEmailAndPassword(email, pass)
  .then(async cred => {
    let profileURL = "";
    if(profileFile){
      profileURL = await uploadFile(profileFile, "image");
      profileFile = null;
      document.getElementById("profilePic").value="";
    }
    firebase.database().ref("users/" + cred.user.uid).set({
      username: username,
      profile: profileURL,
      email: email
    });
    alert("تم إنشاء الحساب بنجاح!");
    loginBox.classList.add("hidden");
  })
  .catch(err => { alert("خطأ في التسجيل: " + err.message); });
}

async function uploadFile(file,type){
  let url=`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${type}/upload`;
  let formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", UPLOAD_PRESET);
  let res = await fetch(url, { method:"POST", body:formData });
  let data = await res.json();
  return data.secure_url;
}

// إضافة منشور
async function addPost(){
  let text=document.getElementById("postText").value.trim();
  if(!text){ alert("اكتب المنشور"); return; }

  let imgUrl="", musicUrl="";
  if(selectedFile){ imgUrl = await uploadFile(selectedFile,"image"); selectedFile=null; document.getElementById("postImage").value=""; }
  if(selectedMusic){ musicUrl = await uploadFile(selectedMusic,"video"); selectedMusic=null; document.getElementById("postMusic").value=""; }

  let userData = await firebase.database().ref("users/"+currentUser.uid).once("value");

  let id=Date.now();
  await firebase.database().ref("posts/"+id).set({
    text:text,
    date:id,
    img:imgUrl,
    music:musicUrl,
    userId: currentUser.uid,
    username: userData.val().username,
    userProfile: userData.val().profile
  });

  document.getElementById("postText").value="";
  showPosts();
}

// عرض المنشورات
function showPosts(){
  const container=document.getElementById("postsContainer");
  firebase.database().ref("posts").on("value",snapshot=>{
    container.innerHTML="";
    if(!snapshot.exists()){ container.innerHTML+="<p>لا توجد منشورات</p>"; return; }
    let posts=[];
    snapshot.forEach(child=>{ posts.push({id:child.key,data:child.val()}); });
    posts.sort((a,b)=>b.data.date - a.data.date); 
    posts.forEach(post=>{
      let id=post.id, p=post.data;
      let date=new Date(p.date);
      let formattedDate=date.toLocaleString("ar");
      let commentsHTML="";
      if(p.comments){ Object.values(p.comments).forEach(c=>{ commentsHTML+=`<div class="comment">${c}</div>`; }); }
      let userLikes = p.likes || {};
      let liked = currentUser && userLikes[currentUser.uid] ? true : false;
      let likeText = liked ? "❤️" : "🤍";

      let deleteBtn = (currentUser && p.userId === currentUser.uid) ? `<button class="action-btn" onclick="deletePost('${id}')"><i class="fa-solid fa-trash"></i> حذف</button>` : "";

      container.innerHTML+=`
      <div class="card">
        <div style="display:flex;align-items:center;gap:10px;">
          <img src="${p.userProfile ? p.userProfile : 'https://i.pravatar.cc/40?img=68'}" 
               style="width:40px;height:40px;border-radius:50%;">
          <strong>${p.username}</strong>
        </div>
        <p>${p.text}</p>
        <div style="color:gray;font-size:13px">📅 ${formattedDate}</div>
        ${p.img?`<img src="${p.img}">`:""}
        ${p.music?`<audio controls src="${p.music}"></audio>`:""}
        <div class="post-actions">
          <button class="action-btn" onclick="toggleLike('${id}')">${likeText} ${Object.keys(userLikes).length}</button>
          ${deleteBtn}
        </div>
        <div class="comment-box">
          <input id="comment${id}" placeholder="تعليق">
          <button class="action-btn" onclick="addComment('${id}')"><i class="fa-solid fa-comment"></i> تعليق</button>
        </div>
        ${commentsHTML}
      </div>`;
    });
  });
}

function toggleLike(postId){
  if(!currentUser){ alert("يجب تسجيل الدخول"); return; }
  let ref=firebase.database().ref("posts/"+postId+"/likes/"+currentUser.uid);
  ref.once("value",snap=>{ if(snap.exists()){ ref.remove(); }else{ ref.set(true); } });
}

function addComment(id){
  let text=document.getElementById("comment"+id).value.trim();
  if(!text) return;
  let cid=Date.now();
  firebase.database().ref("posts/"+id+"/comments/"+cid).set(text);
  document.getElementById("comment"+id).value="";
}

function deletePost(postId){
  if(confirm("هل أنت متأكد من حذف هذا المنشور؟")){
    firebase.database().ref("posts/"+postId).remove();
  }
}

// الأخبار
function addNews(){
  let text=document.getElementById("newsText").value.trim();
  if(!text) return;
  let id=Date.now();
  firebase.database().ref("news/"+id).set(text);
  document.getElementById("newsText").value="";
}

function showNews(){
  const list=document.getElementById("newsList");
  firebase.database().ref("news").on("value",snapshot=>{
    list.innerHTML="";
    if(!snapshot.exists()) return;
    let newsArr=[];
    snapshot.forEach(child=>{ newsArr.push({id:child.key, text:child.val()}); });
    newsArr.sort((a,b)=>b.id - a.id);
    newsArr.forEach(n=>{
      let deleteBtn = currentUser ? 
        `<button class="action-btn" style="margin-left:10px;" onclick="deleteNews('${n.id}')">
           <i class="fa-solid fa-trash"></i> حذف
         </button>` 
        : "";
      list.innerHTML+=`<li>${n.text} ${deleteBtn}</li>`;
    });
  });
}

function deleteNews(newsId){
  if(confirm("هل أنت متأكد من حذف هذا الخبر؟")){
    firebase.database().ref("news/"+newsId).remove();
  }
}

// إعدادات الحساب
accountSettingsBtn.addEventListener("click", ()=>{ accountSettingsBox.classList.toggle("hidden"); });

async function updateAccount(){
  if(!currentUser) return;
  let newUsername = document.getElementById("newUsername").value.trim();
  let updates = {};
  
  if(newUsername){
    let usernameExists = await firebase.database().ref("users").orderByChild("username").equalTo(newUsername).once("value");
    if(usernameExists.exists() && !usernameExists.hasChild(currentUser.uid)){
      alert("اسم المستخدم موجود مسبقاً"); return;
    }
    updates.username = newUsername;
  }

  if(newProfileFile){
    let profileURL = await uploadFile(newProfileFile,"image");
    updates.profile = profileURL;
    newProfileFile = null;
    document.getElementById("newProfilePic").value="";
  }

  if(Object.keys(updates).length>0){
    await firebase.database().ref("users/"+currentUser.uid).update(updates);

    if(updates.username || updates.profile){
      let postsSnapshot = await firebase.database().ref("posts").orderByChild("userId").equalTo(currentUser.uid).once("value");
      postsSnapshot.forEach(post=>{
        let postUpdates = {};
        if(updates.username) postUpdates.username = updates.username;
        if(updates.profile) postUpdates.userProfile = updates.profile;
        firebase.database().ref("posts/"+post.key).update(postUpdates);
      });
    }

    alert("تم تحديث الحساب والمنشورات!");
    accountSettingsBox.classList.add("hidden");
    showPosts();
  }
}

// تسجيل الخروج
logoutBtn.addEventListener("click", ()=>{
  firebase.auth().signOut().then(()=>{
    currentUser=null;
    document.getElementById("adminPanel").classList.add("hidden");
    addNewsPanel.classList.add("hidden");
    logoutBtn.classList.add("hidden");
    accountSettingsBtn.classList.add("hidden");
    document.getElementById("loginToggleBtn").classList.remove("hidden");
    showPosts();
    showNews();
  });
});

// عند تحميل الصفحة
firebase.auth().onAuthStateChanged(async user=>{
  if(user){
    currentUser=user;
    loginBox.classList.add("hidden");
    document.getElementById("adminPanel").classList.remove("hidden");
    addNewsPanel.classList.remove("hidden");
    logoutBtn.classList.remove("hidden");
    accountSettingsBtn.classList.remove("hidden");
    document.getElementById("loginToggleBtn").classList.add("hidden");
    showPosts();
    showNews();
  } else {
    currentUser=null;
    showPosts();
    showNews();
  }
});
</script>
</body>
</html>
